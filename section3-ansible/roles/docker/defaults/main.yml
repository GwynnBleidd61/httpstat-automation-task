---
docker_required_packages:
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  - python3-apt

docker_packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin

docker_keyring_path: /etc/apt/keyrings/docker.asc
docker_apt_repository_filename: docker