---
- name: Check that target host is Ubuntu
  ansible.builtin.assert:
    that:
      - ansible_distribution == "Ubuntu"
    fail_msg: "This role supports Ubuntu hosts only."
    success_msg: "Target host is Ubuntu."

- name: Resolve Docker apt architecture
  ansible.builtin.set_fact:
    docker_apt_arch: "{{ docker_arch_map[ansible_architecture] | default(ansible_architecture) }}"
  vars:
    docker_arch_map:
      x86_64: amd64
      aarch64: arm64
      armv7l: armhf

- name: Install packages required for Docker repository
  ansible.builtin.apt:
    name: "{{ docker_required_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Ensure apt keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Download Docker repository GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: "{{ docker_keyring_path }}"
    owner: root
    group: root
    mode: "0644"

- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: "deb [arch={{ docker_apt_arch }} signed-by={{ docker_keyring_path }}] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    filename: "{{ docker_apt_repository_filename }}"
    state: present
    update_cache: true

- name: Install Docker packages
  ansible.builtin.apt:
    name: "{{ docker_packages }}"
    state: present
    update_cache: true
  notify: Restart docker

- name: Ensure docker group exists
  ansible.builtin.group:
    name: docker
    state: present

- name: Add remote user to docker group
  ansible.builtin.user:
    name: "{{ docker_user }}"
    groups: docker
    append: true

- name: Ensure Docker service is enabled and running
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Check Docker version
  ansible.builtin.command:
    cmd: docker --version
  register: docker_version
  changed_when: false

- name: Show Docker version
  ansible.builtin.debug:
    msg: "{{ docker_version.stdout }}"